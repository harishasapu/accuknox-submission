# ------------------------------------------
# 1️⃣ ClusterIssuer for Let's Encrypt
# ------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: harishasapu0040@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx

# ------------------------------------------
# 2️⃣ Deployment for .NET app
# ------------------------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnet-app
  template:
    metadata:
      labels:
        app: dotnet-app
    spec:
      containers:
      - name: dotnet-app
        # Using Microsoft official ASP.NET Core sample image
        image: mcr.microsoft.com/dotnet/samples:aspnetapp
        ports:
        - containerPort: 80

# ------------------------------------------
# 3️⃣ Service for .NET app
# ------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-service
spec:
  selector:
    app: dotnet-app
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

# ------------------------------------------
# 4️⃣ Ingress (NGINX) with TLS & HTTP-01
# ------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dotnet-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"  # Allow ACME HTTP-01
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - harishn8n.duckdns.org
    secretName: dotnet-tls
  rules:
  - host: harishn8n.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dotnet-service
            port:
              number: 80
