# ==========================================
# 1️⃣ Deployment for .NET App
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnet-app
  template:
    metadata:
      labels:
        app: dotnet-app
    spec:
      containers:
        - name: dotnet-app
          image: harishasapu/dotnet-demoapp:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
# ==========================================
# 2️⃣ Service using NodePort
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: dotnet-nodeport
spec:
  selector:
    app: dotnet-app
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
