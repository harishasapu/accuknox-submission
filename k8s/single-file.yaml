# ==========================================
# 1️⃣ ClusterIssuer for Let's Encrypt TLS
# ==========================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: harishasapu0040@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
# ==========================================
# 2️⃣ Deployment for .NET App
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnet-app
  template:
    metadata:
      labels:
        app: dotnet-app
    spec:
      containers:
        - name: dotnet-app
          image: harishasapu/dotnet-demoapp:latest
          ports:
            - containerPort: 5000   # Corrected port ASP.NET Core listens on
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
# ==========================================
# 3️⃣ Service to expose the Deployment
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: dotnet-service
spec:
  selector:
    app: dotnet-app
  ports:
    - port: 80
      targetPort: 5000   # Map Service port 80 → container 5000
  type: ClusterIP
---
# ==========================================
# 4️⃣ Ingress for external access with TLS
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dotnet-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - harishn8n.duckdns.org
      secretName: dotnet-tls
  rules:
    - host: harishn8n.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dotnet-service
                port:
                  number: 80
