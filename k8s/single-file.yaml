apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dotnet-demo
  template:
    metadata:
      labels:
        app: dotnet-demo
    spec:
      containers:
      - name: dotnet-demo
        image: nginx
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-demo-service
spec:
  type: NodePort
  selector:
    app: dotnet-demo
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
