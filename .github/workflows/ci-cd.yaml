name: Wisecow CI-CD

on:
  push:
    branches:
      - main
    paths:
      - '**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # Step 2: Set up Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:${{ github.sha }}

      # Step 5: Update Kubernetes deployment YAML with latest image
      - name: Update Deployment YAML
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:${{ github.sha }}
        run: |
          sed -i "s|image:.*|image: $IMAGE|g" k8s/deployment.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Auto-update deployment image to $IMAGE [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main

      # Step 6: Install Argo CD CLI
      - name: Install Argo CD CLI
        run: |
          sudo curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo chmod +x /usr/local/bin/argocd

      # Step 7: Sync Argo CD App
      - name: Sync Argo CD App
        env:
          ARGOCD_SERVER: 20.204.69.107:32074
          ARGOCD_APP: wisecoe
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          argocd --insecure --grpc-web login $ARGOCD_SERVER --username admin --password $ARGOCD_TOKEN
          argocd app sync $ARGOCD_APP
